---
codecov:
  branch: main
  notify:
    require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "30...100"

  status:
    project:
      default:
        threshold: 3%
    patch: false
    changes: false

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false

comment:
  layout: "reach, diff, flags, files, footer"
  behavior: default
  require_changes: false

ignore:
  - "tests/"

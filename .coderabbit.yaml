language: en-US
tone_instructions: 'Be constructive and professional. Focus on technical accuracy while maintaining a friendly tone.'
early_access: true
enable_free_tier: true
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: '@coderabbitai summary'
  auto_title_placeholder: '@coderabbitai'
  review_status: true
  commit_status: true
  poem: true
  collapse_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true
  labeling_instructions: []
  path_filters: []
  path_instructions:
    - path: 'src/**/*.cpp'
      instructions: 'Focus on performance, memory management, and RAII principles'
    - path: 'include/**/*.hpp'
      instructions: 'Focus on design patterns, interfaces, and encapsulation'
    - path: 'test/**/*.cpp'
      instructions: |
        Review the following unit test code written using doctest. Ensure the following:
          - Comprehensive test coverage and proper test organization.
          - The code adheres to best practices using doctest.
          - Descriptive test names are used to clearly convey the intent of each test.
  abort_on_close: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords: []
    labels: []
    drafts: true
    base_branches: []
  tools:
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    gitleaks:
      enabled: true
    cppcheck:
      enabled: true
    languagetool:
      enabled: true
      enabled_only: false
      level: default
    hadolint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    pmd:
      enabled: true
    semgrep:
      enabled: true
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    project_keys: []
  linear:
    team_keys: []
  pull_requests:
    scope: auto

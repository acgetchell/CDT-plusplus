---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-latest
            compiler_package: gnu.org/gcc@16
            cc: gcc
            cxx: g++
          - name: Ubuntu Clang
            os: ubuntu-latest
            compiler_package: llvm.org@22
            cc: clang
            cxx: clang++
          - name: macOS AppleClang
            os: macos-latest
            compiler_package: ""
            cc: clang
            cxx: clang++
          - name: Windows MSVC
            os: windows-latest
            compiler_package: ""
            cc: cl
            cxx: cl

    steps:
      - name: Disable Git autocrlf on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Activate MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          arch: x64

      - name: Set up Just
        uses: ./.github/actions/setup-just

      - name: Resolve CI tool versions
        id: tool-versions
        shell: bash
        run: |
          {
            echo "cmake=$(just --evaluate cmake_version)"
            echo "llvm=$(just --evaluate llvm_version)"
            echo "ninja=$(just --evaluate ninja_version)"
            echo "uv=$(just --evaluate uv_version)"
            echo "zizmor=$(just --evaluate zizmor_version)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up canonical CI environment with pkgx
        if: runner.os != 'Windows'
        uses: pkgxdev/setup@4d4ae97af87ccb39ab8be4e073dea697fef2c6f7  # v5.0.0
        with:
          +: |
            llvm.org@${{ steps.tool-versions.outputs.llvm }}
            cmake.org@${{ steps.tool-versions.outputs.cmake }}
            ninja-build.org@${{ steps.tool-versions.outputs.ninja }}

      - name: Set up pinned CMake and Ninja on Windows
        if: runner.os == 'Windows'
        uses: pkgxdev/setup@4d4ae97af87ccb39ab8be4e073dea697fef2c6f7  # v5.0.0
        with:
          +: |
            cmake.org@${{ steps.tool-versions.outputs.cmake }}
            ninja-build.org@${{ steps.tool-versions.outputs.ninja }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: ${{ steps.tool-versions.outputs.uv }}

      - name: Synchronize Python development dependencies
        run: uv sync --locked --group dev

      - name: Install zizmor
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b  # v2.83.4
        with:
          tool: zizmor@${{ steps.tool-versions.outputs.zizmor }}

      - name: Install pinact on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installDirectory = Join-Path $env:RUNNER_TEMP 'pinact-bin'
          New-Item -ItemType Directory -Force -Path $installDirectory | Out-Null
          $env:GOBIN = $installDirectory
          $pinactModule = just --evaluate pinact_module
          go install $pinactModule
          $installDirectory >> $env:GITHUB_PATH

      - name: Select the Windows vcpkg triplet
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'VCPKG_DEFAULT_TRIPLET=x64-windows'

      - name: Restore artifacts or set up vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2  # v11.6
        with:
          vcpkgDirectory: ${{ github.workspace }}/.cache/vcpkg

      - name: Run the canonical local CI contract
        env:
          CC: ${{ matrix.cc }}
          CDT_PKGX_COMPILER_PACKAGE: ${{ matrix.compiler_package }}
          CXX: ${{ matrix.cxx }}
        run: just ci

      - name: Run the opt-in CGAL/oneTBB contract
        env:
          CC: ${{ matrix.cc }}
          CDT_PKGX_COMPILER_PACKAGE: ${{ matrix.compiler_package }}
          CXX: ${{ matrix.cxx }}
        run: just build-parallel

  build:
    name: build
    if: ${{ always() }}
    needs:
      - platform
    runs-on: ubuntu-latest

    steps:
      - name: Verify platform matrix
        env:
          PLATFORM_RESULT: ${{ needs.platform.result }}
        run: |
          test "${PLATFORM_RESULT}" = success

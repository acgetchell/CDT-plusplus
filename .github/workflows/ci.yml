---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-latest
            compiler_package: gnu.org/gcc@16
            cc: gcc
            cxx: g++
          - name: Ubuntu Clang
            os: ubuntu-latest
            compiler_package: llvm.org@22
            cc: clang
            cxx: clang++
          - name: macOS AppleClang
            os: macos-latest
            compiler_package: ""
            cc: clang
            cxx: clang++
          - name: Windows MSVC
            os: windows-latest
            compiler_package: ""
            cc: cl
            cxx: cl

    steps:
      - name: Disable Git autocrlf on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true

      - name: Activate MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          arch: x64

      - name: Set up Just
        uses: ./.github/actions/setup-just

      - name: Resolve CI tool versions
        id: tool-versions
        shell: bash
        run: |
          {
            echo "doxygen=$(just --evaluate doxygen_version)"
            echo "doxygen-windows-sha256=$(just --evaluate doxygen_windows_sha256)"
            echo "graphviz=$(just --evaluate graphviz_version)"
            echo "graphviz-windows-sha256=$(just --evaluate graphviz_windows_sha256)"
            echo "llvm=$(just --evaluate llvm_version)"
            echo "uv=$(just --evaluate uv_version)"
            echo "zizmor=$(just --evaluate zizmor_version)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up canonical CI environment with pkgx
        if: runner.os != 'Windows'
        uses: pkgxdev/setup@4d4ae97af87ccb39ab8be4e073dea697fef2c6f7  # v5.0.0
        with:
          +: |
            doxygen.nl@${{ steps.tool-versions.outputs.doxygen }}
            graphviz.org@${{ steps.tool-versions.outputs.graphviz }}
            llvm.org@${{ steps.tool-versions.outputs.llvm }}

      - name: Install verified documentation tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DOXYGEN_SHA256: ${{ steps.tool-versions.outputs.doxygen-windows-sha256 }}
          DOXYGEN_VERSION: ${{ steps.tool-versions.outputs.doxygen }}
          GRAPHVIZ_SHA256: ${{ steps.tool-versions.outputs.graphviz-windows-sha256 }}
          GRAPHVIZ_VERSION: ${{ steps.tool-versions.outputs.graphviz }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Assert-ArchiveHash {
            param(
              [string] $Archive,
              [string] $Expected
            )

            $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $Archive).Hash.ToLowerInvariant()
            if ($actual -ne $Expected.ToLowerInvariant()) {
              throw "SHA-256 mismatch for $Archive`: expected $Expected, received $actual"
            }
          }

          $doxygenArchive = Join-Path $env:RUNNER_TEMP 'doxygen.zip'
          $doxygenRoot = Join-Path $env:RUNNER_TEMP 'doxygen'
          $doxygenTag = 'Release_' + ($env:DOXYGEN_VERSION -replace '\.', '_')
          $doxygenBase = 'https://github.com/doxygen/doxygen/releases/download'
          $doxygenUrl = "$doxygenBase/$doxygenTag/doxygen-$env:DOXYGEN_VERSION.windows.x64.bin.zip"
          Invoke-WebRequest -Uri $doxygenUrl -OutFile $doxygenArchive
          Assert-ArchiveHash -Archive $doxygenArchive -Expected $env:DOXYGEN_SHA256
          Expand-Archive -LiteralPath $doxygenArchive -DestinationPath $doxygenRoot

          $graphvizArchive = Join-Path $env:RUNNER_TEMP 'graphviz.zip'
          $graphvizRoot = Join-Path $env:RUNNER_TEMP 'graphviz'
          $graphvizPackage = "windows_10_cmake_Release_Graphviz-$env:GRAPHVIZ_VERSION-win64.zip"
          $graphvizBase = 'https://gitlab.com/api/v4/projects/4207231/packages/generic/graphviz-releases'
          $graphvizUrl = "$graphvizBase/$env:GRAPHVIZ_VERSION/$graphvizPackage"
          Invoke-WebRequest -Uri $graphvizUrl -OutFile $graphvizArchive
          Assert-ArchiveHash -Archive $graphvizArchive -Expected $env:GRAPHVIZ_SHA256
          Expand-Archive -LiteralPath $graphvizArchive -DestinationPath $graphvizRoot

          $doxygen = Get-ChildItem -Path $doxygenRoot -Filter doxygen.exe -Recurse | Select-Object -First 1
          $dot = Get-ChildItem -Path $graphvizRoot -Filter dot.exe -Recurse | Select-Object -First 1
          if ($null -eq $doxygen -or $null -eq $dot) {
            throw 'The downloaded documentation archives did not contain doxygen.exe and dot.exe.'
          }

          $doxygen.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $dot.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: ${{ steps.tool-versions.outputs.uv }}

      - name: Synchronize Python development dependencies
        run: uv sync --locked --group dev

      - name: Install zizmor
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
        with:
          tool: zizmor@${{ steps.tool-versions.outputs.zizmor }}

      - name: Install pinact on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installDirectory = Join-Path $env:RUNNER_TEMP 'pinact-bin'
          New-Item -ItemType Directory -Force -Path $installDirectory | Out-Null
          $env:GOBIN = $installDirectory
          $pinactModule = just --evaluate pinact_module
          go install $pinactModule
          $installDirectory | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Select the Windows vcpkg triplet
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value 'VCPKG_DEFAULT_TRIPLET=x64-windows'

      - name: Restore artifacts or set up vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2  # v11.6

      - name: Run the canonical local CI contract
        env:
          CC: ${{ matrix.cc }}
          CDT_PKGX_COMPILER_PACKAGE: ${{ matrix.compiler_package }}
          CXX: ${{ matrix.cxx }}
        run: just ci

  build:
    name: build
    if: ${{ always() }}
    needs:
      - platform
    runs-on: ubuntu-latest

    steps:
      - name: Verify platform matrix
        env:
          PLATFORM_RESULT: ${{ needs.platform.result }}
        run: |
          test "${PLATFORM_RESULT}" = success

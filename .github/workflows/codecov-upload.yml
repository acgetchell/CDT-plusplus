---
name: CodeCov

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codecov:
    name: CodeCov
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Intentionally required for Codecov's OIDC upload.

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        run: |
          sudo apt update
          sudo apt-get install --yes \
            automake autoconf autoconf-archive build-essential ccache \
            curl lcov libtool-bin ninja-build python3-sphinx \
            python3-sphinx-rtd-theme texinfo yasm

      - name: Install LCOV 2.5
        env:
          LCOV_SHA256: 7e5e5a154bd5f3557659c328cab376764e7abd238bb403c424472c296b175126
          LCOV_VERSION: "2.5"
        run: |
          archive="${RUNNER_TEMP}/lcov-${LCOV_VERSION}.tar.gz"
          source_dir="${RUNNER_TEMP}/lcov-${LCOV_VERSION}"
          curl --fail --location --show-error \
            --output "${archive}" \
            "https://github.com/linux-test-project/lcov/releases/download/v${LCOV_VERSION}/lcov-${LCOV_VERSION}.tar.gz"
          echo "${LCOV_SHA256}  ${archive}" | sha256sum --check -
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}"
          sudo make --directory "${source_dir}" install
          lcov --version

      - name: Set up Just
        uses: ./.github/actions/setup-just

      - name: Setup GCC
        uses: pkgxdev/setup@4d4ae97af87ccb39ab8be4e073dea697fef2c6f7  # v5.0.0
        with:
          +: gnu.org/gcc@16

      - run: gcc --version

      - name: Restore artifacts or setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2  # v11.6

      - name: Generate coverage reports
        env:
          COVERAGE_JOBS: 2
          CXX: g++
          GCOV: gcov
        run: just coverage

      - name: Preserve coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          if-no-files-found: warn
          name: coverage-report-${{ github.sha }}
          path: |
            build/coverage.info
            build/coverage-html
          retention-days: 14

      - name: Submit to codecov.io
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: build/coverage.info
          plugins: noop
          use_oidc: true
          verbose: true

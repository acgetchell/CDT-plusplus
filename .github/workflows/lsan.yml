---
name: Leak Sanitizer

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_sanitizer.yml
    with:
      preset: lsan
      job_name: LeakSanitizer
      lsan_options: exitcode=1
